{% extends 'base.html' %}

{% block title %}Анализатор страниц{% endblock %}

{% block body %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm bg-light">
            <div class="card-body p-5">
                <h1 class="card-title mb-3">Анализатор страниц</h1>
                <p class="card-text text-muted mb-4">Бесплатно проверяйте сайты на SEO-пригодность</p>
                
                <form method="POST">
                    <div class="input-group input-group-lg">
                        <input type="url" name="url" class="form-control" placeholder="https://www.example.com" required>
                        <button class="btn btn-primary px-4" type="submit">ПРОВЕРИТЬ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
